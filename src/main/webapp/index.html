<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Java Calculator - Tomcat</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 50px; background-color: #f8f9fa; }
        .calculator-card { max-width: 360px; margin: auto; padding: 25px; background: #ffffff; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input, select, button { width: 100%; padding: 10px; margin-top: 12px; box-sizing: border-box; }
        button { background-color: #28a745; color: white; border: none; font-weight: bold; cursor: pointer; }
        button:hover { background-color: #218838; }
        #result { margin-top: 20px; font-weight: bold; font-size: 1.1em; color: #333; }
    </style>
</head>
<body>

<div class="calculator-card">
    <h2>Web Calculator</h2>
    <input type="number" id="num1" placeholder="First Number (a)" value="20">
    <select id="operation">
        <option value="add">Add (+)</option>
        <option value="subtract">Subtract (-)</option>
        <option value="multiply">Multiply (×)</option>
        <option value="divide">Divide (÷)</option>
    </select>
    <input type="number" id="num2" placeholder="Second Number (b)" value="5">
    <button onclick="performCalculation()">Calculate</button>

    <div id="result">Result: --</div>
</div>

<script>
    async function performCalculation() {
        const a = document.getElementById('num1').value;
        const b = document.getElementById('num2').value;
        const op = document.getElementById('operation').value;

        try {
            const response = await fetch(`./api/calculate?a=${a}&b=${b}&op=${op}`);
            const data = await response.json();
            if (response.ok) {
                document.getElementById('result').innerText = `Result: ${data.result}`;
            } else {
                document.getElementById('result').innerText = `Error: ${data.error}`;
            }
        } catch (err) {
            document.getElementById('result').innerText = 'Connection Failed';
        }
    }
</script>

</body>
</html>
